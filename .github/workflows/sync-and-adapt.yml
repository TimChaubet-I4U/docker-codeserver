# File: .github/workflows/sync-and-adapt.yml
# Author: Tim Chaubet

name: Sync and Adapt for Company GHCR

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/codeserver
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  sync-and-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using your new classic token secret
          token: ${{ secrets.ghcr_rights }}

      - name: Sync with Master (TrueOsiris)
        run: |
          git config --global user.name "Tim Chaubet"
          git config --global user.email "action@github.com"
          git remote add upstream https://github.com/TrueOsiris/docker-codeserver.git
          git fetch upstream main
          # Merge from upstream; 'theirs' prioritizes master updates
          git merge upstream/main --strategy-option theirs -m "Sync: Merge updates from TrueOsiris" || echo "No changes"

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Rewrite References and PUSH CODE
        run: |
          PRIMARY_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          
          # Fix README link to point to your I4U registry
          sed -i "s|ghcr.io/trueosiris/[^[:space:]]*|${PRIMARY_TAG}|g" README.md
          
          # Fix build workflow references to point to your account (codeserver shortname)
          sed -i "s|IMAGE_NAME: .*|IMAGE_NAME: \${{ github.repository_owner }}/codeserver|g" .github/workflows/build-docker-image.yml
          sed -i "s|REPO_FULL: .*|REPO_FULL: \${{ github.repository_owner }}/codeserver|g" .github/workflows/build-docker-image.yml
          sed -i "s|REPO_SHORT: .*|REPO_SHORT: \${{ github.repository_owner }}/codeserver|g" .github/workflows/build-docker-image.yml
          
          git add README.md .github/workflows/build-docker-image.yml
          if ! git diff --cached --exit-code; then
            git commit -m "chore: adapt registry references and force registry targets"
            # Push code changes now so they are saved even if Docker fails
            git push origin main
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_rights }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max