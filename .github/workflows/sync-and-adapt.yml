# File: .github/workflows/sync-and-adapt.yml
# Author: Tim Chaubet

name: Sync and Adapt (Excluding Workflows)

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/codeserver
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  sync-and-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ghcr_rights }}

      - name: Sync Code ONLY (Excluding Workflows)
        run: |
          git config --global user.name "Tim Chaubet"
          git config --global user.email "action@github.com"
          
          git remote add upstream https://github.com/TrueOsiris/docker-codeserver.git
          git fetch upstream main
          
          # 1. Start the merge but don't commit it yet
          git merge upstream/main --no-commit --no-ff --strategy-option theirs
          
          # 2. Force the .github/workflows directory back to your local version
          # This prevents upstream's build-and-push.yml from appearing or changing yours
          git checkout HEAD -- .github/workflows/
          
          # 3. Finalize the merge
          # The [skip ci] prevents this push from triggering other actions
          git commit -m "Sync: Merge code from upstream (Excluding Workflows) [skip ci]" || echo "No changes to sync"

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Rewrite README References and PUSH
        run: |
          PRIMARY_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          
          # Update README to point to your I4U registry
          sed -i "s|ghcr.io/trueosiris/[^[:space:]]*|${PRIMARY_TAG}|g" README.md
          
          git add README.md
          if ! git diff --cached --exit-code; then
            # Adding [skip ci] here again just to be safe
            git commit -m "chore: adapt registry references [skip ci]"
            git push origin main
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_rights }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max